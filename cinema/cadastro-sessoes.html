<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Cadastro de Sessões</title>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar bg-dark navbar-expand-lg fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="./img/movie.svg" alt="">
                Cinema
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="./cadastro-filmes.html" class="nav-link">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-salas.html" class="nav-link">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-sessoes.html" class="nav-link">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./sessoes.html" class="nav-link">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./venda-ingressos.html" class="nav-link">Ingressos</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1>Cadastro de Sessões</h1>
        <hr>

        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow">
                    <div class="card-body p-4">

                        <select class="form-select mb-3" id="filme">
                            <option value="" disabled selected>Selecione um filme</option>
                        </select>


                        <select class="form-select mb-3" id="sala">
                            <option value="" disabled selected>Selecione uma sala</option>
                        </select>



                        <input type="datetime-local" class="form-control mb-3" id="dataHoraSessao">


                        <input type="number" class="form-control mb-3" id="precoIngresso"
                            placeholder="Preço do Ingresso" step="0.01"> <!-- Permite valores decimais -->



                        <select class="form-select mb-3" id="idioma">
                            <option value="" disabled selected>Selecione o idioma</option>
                            <option value="Dublado">Dublado</option>
                            <option value="Legendado">Legendado</option>
                        </select>



                        <select class="form-select mb-3" id="formato">
                            <option value="" disabled selected>Selecione o formato</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                        </select>


                        <button type="button" class="btn btn-primary w-100" id="btnSalvarSessao">
                            Salvar Sessão
                        </button>



                        <div id="mensagem"></div>

                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
