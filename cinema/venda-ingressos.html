<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Cinema</title>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar bg-dark navbar-expand-lg fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="./img/movie.svg" alt="">
                Cinema
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="./cadastro-filmes.html" class="nav-link">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-salas.html" class="nav-link">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-sessoes.html" class="nav-link">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./sessoes.html" class="nav-link">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./venda-ingressos.html" class="nav-link">Ingressos</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1>Venda de Ingressos</h1>
        <hr>


        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <select class="form-select mb-3" id="sessao">
                            <option value="" disabled selected>Selecione a sessão</option>
                        </select>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nomeCliente" placeholder="">
                            <label for="nomeCliente">Nome do Cliente</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="cpf" placeholder="">
                            <label for="cpf">CPF</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="assento" placeholder="">
                            <label for="assento">Assento</label>
                        </div>

                        <select class="form-select mb-3" id="tipoPagamento">
                            <option value="" disabled selected>Selecione o tipo de pagamento</option>
                            <option value="dinheiro">Dinheiro</option>
                            <option value="cartao">Cartão</option>
                            <option value="pix">Pix</option>
                        </select>

                        <button type="button" class="btn btn-primary w-100" id="btnSalvarIngresso">Confirmar
                            Venda</button>

                        <div id="mensagem"></div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
