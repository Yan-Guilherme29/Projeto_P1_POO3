    <meta charset="UTF-8">

    <title>Cinema</title>
</head>

<body style="background-color: #d8ecfa;">
    <!-- NAVBAR -->

    <nav class="navbar bg-dark navbar-expand-lg fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="./img/movie.svg" alt="">
                Cinema
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="./cadastro-filmes.html" class="nav-link">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-salas.html" class="nav-link">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-sessoes.html" class="nav-link">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./sessoes.html" class="nav-link">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./venda-ingressos.html" class="nav-link">Ingressos</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 pt-5">
        <h1>Cadastro de Salas</h1>
        <hr>


        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nomeSala" placeholder="">
                            <label for="titulo">Nome da Sala</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="capacidade" placeholder="">
                            <label for="genero">Capacidade (Pessoas)</label>
                        </div>

                        <select class="form-select mb-3" id="tipoSala">
                            <option value="" selected disabled>Selecione o tipo da Sala</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                            <option value="IMax">IMax</option>
                        </select>

                        <button type="button" class="btn btn-success w-100" id="btnSalvarSala">Salvar Sala</button>

                        <div id="mensagem"></div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</body>
