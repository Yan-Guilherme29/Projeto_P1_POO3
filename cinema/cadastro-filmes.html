<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Cinema</title>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar bg-dark navbar-expand-lg fixed-top" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="./img/movie.svg" alt="">
                Cinema
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="./cadastro-filmes.html" class="nav-link">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-salas.html" class="nav-link">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a href="./cadastro-sessoes.html" class="nav-link">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./sessoes.html" class="nav-link">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="./venda-ingressos.html" class="nav-link">Ingressos</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1>Cadastro de Filmes</h1>
        <hr>


        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow">
                    <div class="card-body p-3">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="titulo" placeholder="">
                            <label for="titulo">Título do Filme</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="genero" placeholder="">
                            <label for="genero">Gênero</label>
                        </div>

                        <div class="form-floating mb-3">
                            <textarea class="form-control" id="descricao" placeholder=""></textarea>
                            <label for="descricao">Descrição</label>
                        </div>

                        <select class="form-select mb-3" id="classificacao">
                            <option value="" selected disabled>Classificação do Filme</option>
                            <option value="1">Livre</option>
                            <option value="2">10 anos</option>
                            <option value="3">12 anos</option>
                            <option value="4">14 anos</option>
                            <option value="5">16 anos</option>
                            <option value="6">18 anos</option>
                        </select>

                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="duracao" placeholder="">
                            <label for="duracao">Duração (minutos)</label>
                        </div>

                        <div class="form-floating mb-2">
                            <input type="date" class="form-control" id="dataEstreia">
                            <label for="dataEstreia">Data de Estreia</label>
                        </div>

                        <button type="button" class="btn btn-primary w-100" id="btnSalvarFilme">Salvar Filme</button>

                        <div id="mensagem"></div>

                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
</body>

</html>
